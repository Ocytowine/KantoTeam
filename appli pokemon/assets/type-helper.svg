<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <defs>
    <radialGradient id="tile" cx="32%" cy="18%" r="92%">
      <stop offset="0" stop-color="#2b313c"/>
      <stop offset="0.58" stop-color="#171b22"/>
      <stop offset="1" stop-color="#0b0d12"/>
    </radialGradient>
    <radialGradient id="gold" cx="32%" cy="18%" r="88%">
      <stop offset="0" stop-color="#fff4b5"/>
      <stop offset="0.36" stop-color="#f9dc6c"/>
      <stop offset="0.72" stop-color="#f4c84a"/>
      <stop offset="1" stop-color="#b77d0d"/>
    </radialGradient>
    <linearGradient id="arrow" x1="0.15" y1="0.15" x2="0.9" y2="0.85">
      <stop offset="0" stop-color="#fff8cf"/>
      <stop offset="0.38" stop-color="#f8d864"/>
      <stop offset="1" stop-color="#d89f1d"/>
    </linearGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.4" flood-color="#000" flood-opacity="0.48"/>
    </filter>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.6" flood-color="#ffe88b" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect x="3" y="3" width="66" height="66" rx="16" fill="url(#tile)" stroke="#343d4b" stroke-width="1.5"/>

  <g filter="url(#shadow)">
    <circle cx="24" cy="24" r="15" fill="#0d1016" stroke="#f4c84a" stroke-width="1.4" opacity="0.72"/>
    <image href="../data/feu.png" x="8.5" y="8.5" width="31" height="31" preserveAspectRatio="xMidYMid meet"/>
    <circle cx="48" cy="48" r="15" fill="#0d1016" stroke="#f4c84a" stroke-width="1.4" opacity="0.72"/>
    <image href="../data/plante.png" x="32.5" y="32.5" width="31" height="31" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g filter="url(#glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M30 39c5.5-1 10-5.2 11.2-11.2" stroke="#111318" stroke-width="8"/>
    <path d="M41.2 27.8l-7.2 1.1M41.2 27.8l-2.8 6.7" stroke="#111318" stroke-width="8"/>
    <path d="M30 39c5.5-1 10-5.2 11.2-11.2" stroke="url(#arrow)" stroke-width="3.8"/>
    <path d="M41.2 27.8l-7.2 1.1M41.2 27.8l-2.8 6.7" stroke="url(#arrow)" stroke-width="3.8"/>
  </g>

  <circle cx="24" cy="24" r="15" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.72"/>
  <circle cx="48" cy="48" r="15" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.72"/>
